name: Run Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install poetry
      - run: poetry install --with dev
      - run: |
          poetry run pytest \
            --junitxml=results.xml \
            --cov=src/thalianacv \
            --cov-report=xml \
            --cov-fail-under=70 \
            --cov-report=term-missing
      - uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: results.xml
